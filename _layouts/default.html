<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link
    href="https://fonts.bunny.net/css?family=Lato:400,700,900|Fira+Code:400,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <link rel="stylesheet" href="/assets/css/tech-glass.css" />
  <style>
    /* ============================================================
       SITE-SPECIFIC — Learning Path
       ============================================================ */
    .site-nav__brand {
      margin-right: auto;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0.5px;
      color: var(--color-foreground) !important;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4em;
      border: none !important;
      background: none !important;
    }
    .site-nav__brand span { color: var(--color-highlight); }
    .site-nav__brand:hover { opacity: 0.85; text-decoration: none; }

    .page-wrapper {
      margin-top: 3.5rem;
      min-height: calc(100vh - 3.5rem);
    }

    .content-area {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Navigation principale">
    <a class="site-nav__brand" href="{{ '/' | relative_url }}">
      <i class="fa-brands fa-github" aria-hidden="true"></i>
      Copilot <span>Learning Path</span>
    </a>
    <button class="nav-burger" id="navBurger" aria-label="Menu">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="nav-links" id="navLinks">
      {% for item in site.data.nav %}
        {% if item.dropdown %}
        <div class="nav-dropdown" data-dropdown>
          <button class="nav-dropdown__trigger">
            <i class="{{ item.icon }}" aria-hidden="true"></i> {{ item.label }}
            <i class="fa-solid fa-chevron-down" aria-hidden="true"></i>
          </button>
          <div class="nav-dropdown__menu">
            {% for sub in item.items %}
            <a href="{{ sub.url }}"{% if sub.url == '/learning-path-copilot/' %} class="active"{% endif %}>
              <i class="{{ sub.icon }}" aria-hidden="true"></i> {{ sub.label }}
            </a>
            {% endfor %}
          </div>
        </div>
        {% else %}
        <a href="{{ item.url }}">
          <i class="{{ item.icon }}" aria-hidden="true"></i> {{ item.label }}
        </a>
        {% endif %}
      {% endfor %}
    </div>
  </nav>

  <script>
    document.getElementById('navBurger')?.addEventListener('click', () => {
      document.getElementById('navLinks')?.classList.toggle('open');
    });
    document.querySelectorAll('[data-dropdown]').forEach(dd => {
      dd.querySelector('.nav-dropdown__trigger')?.addEventListener('click', e => {
        e.stopPropagation();
        document.querySelectorAll('[data-dropdown]').forEach(o => { if (o !== dd) o.classList.remove('open'); });
        dd.classList.toggle('open');
      });
    });
    document.addEventListener('click', () => {
      document.querySelectorAll('[data-dropdown]').forEach(d => d.classList.remove('open'));
    });
  </script>

  <div class="page-wrapper">
    {{ content }}
  </div>

  <footer>
    <p>
      © {{ site.time | date: '%Y' }} Sébastien Degodez —
      <a href="https://SebastienDegodez.github.io" target="_blank" rel="noopener">Portfolio</a>
      ·
      <a href="https://github.com/SebastienDegodez/md-copilot" target="_blank" rel="noopener">
        <i class="fa-brands fa-github" aria-hidden="true"></i> Source
      </a>
    </p>
  </footer>

</body>
</html>
