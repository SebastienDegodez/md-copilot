<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.bunny.net" />
  <link
    href="https://fonts.bunny.net/css?family=Lato:400,700,900|Fira+Code:400,700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />
  <style>
    /* ============================================================
       THEME — Tech Glass (identique au site perso)
       ============================================================ */
    :root {
      --color-background: #0e1618;
      --color-foreground: #e9f7ef;
      --color-primary:    #4ed58a;
      --color-highlight:  #8be5b1;
      --color-dimmed:     #b8d0c1;
      --color-stripe:     rgba(139, 229, 177, 0.14);
      --gradient-overlay: linear-gradient(
        135deg,
        rgba(78, 213, 138, 0.08) 0%,
        rgba(78, 213, 138, 0.03) 50%,
        rgba(0, 0, 0, 0) 50%,
        rgba(0, 0, 0, 0.2) 100%
      );
      --font-sans: Lato, 'Avenir Next', Avenir, 'Trebuchet MS', 'Segoe UI', sans-serif;
      --font-mono: 'Fira Code', 'JetBrains Mono', 'SFMono-Regular', Menlo, monospace;
      --radius: 6px;
      --radius-card: 10px;
      --transition: 0.2s ease;

      --glass-bg: rgba(15, 27, 24, 0.9);
      --glass-bg-strong: rgba(10, 20, 18, 0.95);
      --glass-border: rgba(139, 229, 177, 0.22);
      --glass-border-strong: rgba(139, 229, 177, 0.34);
      --glass-highlight: rgba(233, 247, 239, 0.12);
      --glass-shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      --glass-shadow-hover: 0 24px 70px rgba(0, 0, 0, 0.55);
      --glass-blur: 14px;
      --motion-fast: 160ms ease;
      --motion-medium: 260ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--color-background);
      background-image: radial-gradient(circle at 80% 10%, rgba(78, 213, 138, 0.12), transparent 28%), var(--gradient-overlay);
      color: var(--color-foreground);
      font-family: var(--font-sans);
      font-size: 18px;
      line-height: 1.65;
      letter-spacing: 0.2px;
    }
    a {
      color: var(--color-highlight);
      text-decoration: none;
      transition: opacity var(--transition);
    }
    a:hover { opacity: 0.8; text-decoration: underline; }

    /* ============================================================
       NAVIGATION
       ============================================================ */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 2rem;
      background: var(--glass-bg-strong);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: 0 8px 28px rgba(4, 12, 18, 0.28);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }
    .site-nav__brand {
      font-size: 1rem;
      font-weight: 900;
      color: var(--color-foreground);
      letter-spacing: 0.5px;
      margin-right: auto;
    }
    .site-nav__brand span { color: var(--color-highlight); }
    .site-nav a.nav-link {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--color-dimmed);
      padding: 0.3em 0.75em;
      border-radius: var(--radius);
      transition: color var(--motion-fast), background var(--motion-fast);
      border: 1px solid transparent;
    }
    .site-nav a.nav-link:hover,
    .site-nav a.nav-link.active {
      color: var(--color-foreground);
      background: rgba(139, 229, 177, 0.16);
      border-color: rgba(139, 229, 177, 0.28);
      text-decoration: none;
      opacity: 1;
    }

    /* Mobile burger */
    .site-nav__burger {
      display: none;
      background: none;
      border: none;
      color: var(--color-dimmed);
      font-size: 1.4rem;
      cursor: pointer;
    }

    /* ============================================================
       CONTENT
       ============================================================ */
    .page-wrapper {
      margin-top: 3.5rem;
      min-height: calc(100vh - 3.5rem);
    }

    .content-area {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* ============================================================
       FOOTER
       ============================================================ */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: var(--color-dimmed);
      border-top: 1px solid var(--color-stripe);
    }
    footer a { color: var(--color-highlight); }
  </style>
</head>
<body>

  <nav class="site-nav" aria-label="Navigation principale">
    <div class="site-nav__brand">
      <a href="{{ '/' | relative_url }}" style="color:inherit;text-decoration:none">
        <i class="fa-brands fa-github" aria-hidden="true"></i>
        Copilot <span>Learning Path</span>
      </a>
    </div>
    <a class="nav-link" href="https://SebastienDegodez.github.io" target="_blank" rel="noopener">
      <i class="fa-solid fa-house" aria-hidden="true"></i> Portfolio
    </a>
    <a class="nav-link" href="https://github.com/SebastienDegodez/md-copilot" target="_blank" rel="noopener">
      <i class="fa-brands fa-github" aria-hidden="true"></i> GitHub
    </a>
  </nav>

  <div class="page-wrapper">
    {{ content }}
  </div>

  <footer>
    <p>
      © {{ site.time | date: '%Y' }} Sébastien Degodez —
      <a href="https://SebastienDegodez.github.io" target="_blank" rel="noopener">Portfolio</a>
      ·
      <a href="https://github.com/SebastienDegodez/md-copilot" target="_blank" rel="noopener">
        <i class="fa-brands fa-github" aria-hidden="true"></i> Source
      </a>
    </p>
  </footer>

</body>
</html>
